[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "gwent-shared"
version = "0.1.0"
description = "Shared typed utilities for the Gwent workspace"
requires-python = ">=3.12"
dependencies = []

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]
include = ["gwent_shared*"]

[tool.setuptools.package-data]
gwent_shared = ["py.typed"]
