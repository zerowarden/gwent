    target_side: opponent
    minimum_opponent_row_total: 10
    destroy_all_tied_strongest: true
    rule_text: "Destroy your enemy's strongest Siege unit(s) if the combined strength of all his or her Siege units is 10 or more."
    implementation_notes: "Check only the opponent Siege row. Use effective row strength, not just printed base strength. Destroy all tied strongest eligible non-hero units on that row."

