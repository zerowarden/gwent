leaders:
  - leader_id: northern_realms_foltest_king_of_temeria
    name: "Foltest: King of Temeria"
    faction: northern_realms
    source_set: base_game
    ability_kind: play_weather_from_deck
    ability_mode: active
    uses_per_match: 1
    weather_kind: impenetrable_fog
    selection_mode: specific
    rule_text: "Pick an Impenetrable Fog card from your deck and play it instantly."
    implementation_notes: "Choose an Impenetrable Fog from your own deck, remove it from the deck, and resolve it exactly as if it had been played normally."

  - leader_id: northern_realms_foltest_lord_commander_of_the_north
    name: "Foltest: Lord Commander of the North"
    faction: northern_realms
    source_set: base_game
    ability_kind: clear_weather
    ability_mode: active
    uses_per_match: 1
    rule_text: "Clear any weather effects (resulting from Biting Frost, Torrential Rain or Impenetrable Fog cards) in play."
    implementation_notes: "Resolve exactly like Clear Weather: remove all active weather cards/effects from the battlefield."

  - leader_id: northern_realms_foltest_the_siegemaster
    name: "Foltest: The Siegemaster"
    faction: northern_realms
    source_set: base_game
    ability_kind: horn_own_row
    ability_mode: active
    uses_per_match: 1
    affected_row: siege
    target_side: self
    persists_until: round_end
    blocked_if_row_already_affected_by_horn: true
    rule_text: "Doubles the strength of all your Siege units (unless a Commander's Horn is also present on that row)."
    implementation_notes: "Create a Horn effect on your own Siege row for the rest of the current round. If that row is already affected by any Horn source, the leader ability should not add a second Horn effect."

  - leader_id: northern_realms_foltest_the_steel_forged
