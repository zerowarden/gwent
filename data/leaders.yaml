    ability_mode: active
    uses_per_match: 1
    target_scope: all_battlefield_agile_units
    optimization_goal: maximize_effective_strength
    do_not_move_if_already_optimal: true
    tie_policy: keep_current_row_on_tie
    rule_text: "Move agile units to whichever valid row maximizes their strength (don't move units already in optimal row)."
    implementation_notes: "The public card text does not limit this to one side, so the safest normalization is to evaluate all Agile units currently on the battlefield and move each one, on its current controller's side, to the valid row that maximizes its effective strength under current effects. If both valid rows are equally good, leave the unit where it is."

