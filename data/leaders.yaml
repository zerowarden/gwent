    ability_mode: passive
    target_scope: both_players
    persists_until: match_end
    applies_only_to: restore_unit_to_battlefield_effects
    rule_text: "Abilities that restore a unit to the battlefield restore a randomly-chosen unit. Affects both players."
    implementation_notes: "This modifies battlefield-resurrection effects only, such as Medic-like effects. When an effect would let a player choose an eligible unit to restore directly to the battlefield, the restored unit is selected randomly instead. It should not affect effects that return cards to hand or shuffle cards into decks."

